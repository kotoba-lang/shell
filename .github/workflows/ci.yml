name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macos-latest, not ubuntu: launcher_test.clj's native-host tests shell
    # out to real macOS tools (/usr/bin/pbpaste, /usr/bin/pbcopy, the
    # kotoba-shell-host-macos* binaries) -- this repo's substrate is
    # macOS-specific by design (WebAuthn PRF passkey provider, #1).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: shell
      # launcher.clj's substrate-readiness check reads these siblings by
      # hardcoded relative path (../dom-gpu, ../browser).
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/dom-gpu
          path: dom-gpu
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/browser
          path: browser
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      # app scaffold(macOS/iOS)は project.pbxproj を手書きせず xcodegen で
      # 生成する(ADR-2607081015 の WKWebView 実用優先決定、native-render-pipeline
      # ブランチ)。CI にも無いと launcher_test.clj の app-scaffold テストが
      # xcodegen 不在のまま "動いたことにする" 偽陽性になる。
      - run: brew install xcodegen
      - working-directory: shell
        run: clojure -M:test
      - working-directory: shell
        run: clojure -M:lint
      # ADR-2607081015 follow-up(native-render-pipeline, build-step-timeouts):
      # unit test は :xcodegen-ok?/ファイル存在だけを確認しており、xcodegen が
      # 吐いた project.pbxproj が実際に xcodebuild を通るかは手動確認でしか
      # 担保していなかった(実 gap — 見つかった実バグ2件、project.yml の
      # resources: キー無視と10秒 timeout はどちらもここを自動化していれば
      # CI が先に検出できていたはず)。scaffold→build --execute を実行し、
      # xcodebuild が本当に成功することを毎回確認する。
      - name: app build smoke test (macOS)
        working-directory: shell
        run: |
          ./bin/kotoba-shell app scaffold --target macos --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --output-dir /tmp/kotoba-shell-ci-smoke-macos --json
          ./bin/kotoba-shell app build --target macos --execute --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --output-dir /tmp/kotoba-shell-ci-smoke-macos --json
      - name: app build smoke test (iOS simulator SDK)
        working-directory: shell
        run: |
          ./bin/kotoba-shell app scaffold --target ios --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --ios-bundle-id dev.kotoba.ci-smoke \
            --output-dir /tmp/kotoba-shell-ci-smoke-ios --json
          ./bin/kotoba-shell app build --target ios --execute --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --ios-bundle-id dev.kotoba.ci-smoke \
            --output-dir /tmp/kotoba-shell-ci-smoke-ios --json
      # Android の app build は README で "Not yet wired into CI" と明記していた
      # gap — default-app-build-step が呼ぶのは `gradle`(`./gradlew` ではなく
      # bare command)なので、macos-latest ランナーに無ければ brew で入れる。
      - run: brew install gradle
      # 実機確認(この worktree で AGP 8.5.0 / compileSdk 35 を再現): Gradle 9.x が
      # AGP の androidJdkImage 変換(core-for-system-modules.jar 用 jlink)に使う
      # JDK を Homebrew の無印 `openjdk`(執筆時点で 26)から自動検出してしまうと
      # `Could not resolve all files for configuration ':app:androidJdkImage'`
      # で assembleDebug が落ちる(AGP 8.5.0 は compileSdk 34 までしか検証されて
      # おらず JDK 17/21 系を前提にしている)。JAVA_HOME を明示して Gradle 自身と
      # そのツールチェーン検出を JDK 17 に固定することで解消する。
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: app build smoke test (Android)
        working-directory: shell
        run: |
          ./bin/kotoba-shell app scaffold --target android --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --android-application-id dev.kotoba.cismoke \
            --output-dir /tmp/kotoba-shell-ci-smoke-android --json
          ./bin/kotoba-shell app build --target android --execute --app-id dev.kotoba.ci-smoke \
            --app-name CISmoke --version 0.1.0 --android-application-id dev.kotoba.cismoke \
            --output-dir /tmp/kotoba-shell-ci-smoke-android --json
